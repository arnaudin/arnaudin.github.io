<footer class="main-footer">
    <div class="footer-cta">
        <p class="meta-label">Next step</p>
        <p class="footer-cta-title">Have a project or role in&nbsp;mind?</p>
        <p class="footer-cta-action"><a href="/contact/"><span class="footer-cta-text">Get in touch</span><span class="footer-cta-arrow" aria-hidden="true">→</span></a></p>
    </div>

    <div class="footer-meta">
        <ul class="footer-social">
            <li><a href="https://linkedin.com/in/{{ site.social-username.linkedin }}">LinkedIn</a></li>
            <li><a href="https://github.com/{{ site.social-username.github }}">GitHub</a></li>
        </ul>
        <p class="footer-license">
            <a href="https://github.com/arnaudin/arnaudin.github.io/blob/main/LICENSE" title="View the license for this site and its content">© {{ site.start-year }}–{{ site.time | date: '%Y' }} Ryan Arnaudin</a>
        </p>
        <div class="theme-select">
            <span class="theme-select-label" id="footer-theme-label">Mode</span>
            <div class="theme-select-options" role="radiogroup" aria-labelledby="footer-theme-label">
                <button class="theme-option" type="button" role="radio" aria-checked="true" data-theme-set="paper">
                    <span class="theme-swatch theme-swatch-paper" aria-hidden="true"></span>Paper</button>
                <button class="theme-option" type="button" role="radio" aria-checked="false" data-theme-set="blueprint">
                    <span class="theme-swatch theme-swatch-blueprint" aria-hidden="true"></span>Blueprint</button>
                <button class="theme-option" type="button" role="radio" aria-checked="false" data-theme-set="satellite">
                    <span class="theme-swatch theme-swatch-satellite" aria-hidden="true"></span>Satellite</button>
            </div>
        </div>
    </div>
</footer>
