{%- comment -%}
    Renders one image as a <figure> using the same pipeline as project
    content_layout images (_includes/layout.html): dimensions and webp
    variants from _data/image_dims.yml (generated by tools/optimize-images.sh),
    lazy loading, a build-time PhotoSwipe gallery link, and a figcaption that
    picks up the shared "Fig. NN" counter (%figcaption-numbered).

    Usage in post markdown (url is relative to /images, matching the
    image_dims.yml keys):
      {% include figure.html url="/posts/airfoil-app/airfoil-app-screenshot.jpg"
         caption="The app UI" class="img-center" %}

    Params:
      url      required — image path relative to site.image_serve_path
      caption  optional figcaption text (numbered via CSS counter)
      alt      optional alt text; falls back to caption, then page title
      class    optional img classes (img-full-width, img-75vh, img-center, …)
      sizes    optional srcset sizes hint, e.g. "(min-width: 700px) 50vw, 100vw"
               for two-up layouts; defaults to the single-column value
      gallery  "none" to keep the image out of the lightbox
      eager    true to load eagerly at high priority (likely LCP image)
{%- endcomment -%}
{%- assign dims = site.data.image_dims[include.url] -%}
{%- capture full_src %}{{ include.url | prepend: site.image_serve_path }}{% endcapture -%}
{%- assign webp_url = include.url | replace: '.png', '.webp' | replace: '.jpg', '.webp' | replace: '.jpeg', '.webp' -%}
{%- capture fig_alt -%}{%- if include.alt -%}{{ include.alt }}{%- elsif include.caption -%}{{ include.caption }}{%- else -%}{{ page.title }}{%- endif -%}{%- endcapture -%}
{%- if include.eager -%}
    {%- assign img_loading = 'fetchpriority="high"' -%}
{%- else -%}
    {%- assign img_loading = 'loading="lazy"' -%}
{%- endif -%}
{%- assign img_sizes = include.sizes | default: "(min-width: 1300px) 1200px, 100vw" -%}
{%- capture image_tag -%}
    {%- if dims.webp -%}
        <picture>
            {%- if dims.w900 -%}
                <source type="image/webp" srcset="{{ webp_url | replace: '.webp', '.900w.webp' | prepend: site.image_serve_path }} 900w, {{ webp_url | prepend: site.image_serve_path }} {{ dims.w }}w" sizes="{{ img_sizes }}">
            {%- else -%}
                <source type="image/webp" srcset="{{ webp_url | prepend: site.image_serve_path }}">
            {%- endif -%}
            <img class="{{ include.class }}" src="{{ full_src }}" alt="{{ fig_alt | normalize_whitespace | escape }}" width="{{ dims.w }}" height="{{ dims.h }}" {{ img_loading }} decoding="async">
        </picture>
    {%- elsif dims -%}
        <img class="{{ include.class }}" src="{{ full_src }}" alt="{{ fig_alt | normalize_whitespace | escape }}" width="{{ dims.w }}" height="{{ dims.h }}" {{ img_loading }} decoding="async">
    {%- else -%}
        <img class="{{ include.class }}" src="{{ full_src }}" alt="{{ fig_alt | normalize_whitespace | escape }}" {{ img_loading }} decoding="async">
    {%- endif -%}
{%- endcapture -%}
<figure class="image-wrapper {{ include.positioning }}">{% if include.gallery == 'none' %}{{ image_tag }}{% else %}<a class="gallery-link" href="{% if dims.webp %}{{ webp_url | prepend: site.image_serve_path }}{% else %}{{ full_src }}{% endif %}" {% if dims %}data-pswp-width="{{ dims.w }}" data-pswp-height="{{ dims.h }}"{% endif %} target="_blank" rel="noopener">{{ image_tag }}</a>{% endif %}{% if include.caption %}<figcaption>{{ include.caption }}</figcaption>{% endif %}</figure>
