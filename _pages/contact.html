title: Contact
permalink: /contact/
priority: 0.9
captcha: true
---

<script type="application/ld+json">
  {
    "@context": "http://schema.org",
    "@type": "Person",
    "name": "Ryan Arnaudin",
    "url": "https://ryanarnaudin.com/",
    "sameAs": ["https://twitter.com/{{ site.social-username.twitter | remove: '@' }}", "https://linkedin.com/in/{{ site.social-username.linkedin }}", "https://github.com/{{ site.social-username.github }}"]
  }
</script>
<section class="home-hero home-hero-compact">
  <div class="home-hero-inner">
    <p class="home-hero-kicker meta-label">Get in touch</p>
    <h1 class="home-hero-title">Contact Ryan</h1>
    <p class="home-hero-lede">Have a project, a role, or just want to talk shop? Send a message — I read everything.</p>
  </div>
</section>
<div class="contact-wrapper">
  <div class="contact">
    <aside class="contact-intro">
      <h2 class="contact-label">Elsewhere</h2>
      <ul class="contact-links">
        <li>
          <a href="https://linkedin.com/in/{{ site.social-username.linkedin }}">LinkedIn</a>
        </li>
        <li>
          <a href="https://github.com/{{ site.social-username.github }}">GitHub</a>
        </li>
        <li>
          <a href="https://twitter.com/{{ site.social-username.twitter | remove: '@' }}">Twitter</a>
        </li>
      </ul>
    </aside>

    <div class="contact-form">
      <h2 class="contact-label">Send a message</h2>
      <form action="https://formkeep.com/f/5410c0bbb8e4"
      accept-charset="UTF-8"
      enctype="multipart/form-data"
      method="POST">
        <input type="hidden" name="utf8" value="✓">
        <input type="text" name="name" placeholder="Your name" required="required">
        <input type="email" name="email" placeholder="Your email" required="required">
        <textarea name="message" rows="5" placeholder="Enter a message here" required="required"></textarea>
        <label>Subscribe to infrequent updates:
          <input type="checkbox" name="$subscribe" value="yes">
        </label>
        <input type="hidden" id="g-recaptcha-response" name="g-recaptcha-response">
        <button class="button-secondary" type="submit">Submit</button>
      </form>
    </div>

  </div>
</div>
